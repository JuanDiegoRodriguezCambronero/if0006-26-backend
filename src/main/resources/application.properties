spring.application.name=product-api

#spring.application.name=demo

# Perfil local para cargar la configuración privada
#spring.profiles.active=local
#Notar que ahora hay dos archivos: local y prod .properties, cada uno con su propia configuración de base de datos.
# El perfil activo se puede cambiar para cargar la configuración correspondiente al entorno deseado (local o producción).
spring.profiles.active=prod
# Configuración JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Puerto del servidor
server.port=8080